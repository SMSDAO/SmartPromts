name: Production Pre-flight Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Environment schema validation
  # ---------------------------------------------------------------------------
  validate-env:
    name: Validate Environment Schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Zod config schema compiles
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          SUPABASE_SERVICE_ROLE_KEY: test_service_role
          OPENAI_API_KEY: test
          STRIPE_SECRET_KEY: test
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_PRICE_ID_FREE: price_test_free
          STRIPE_PRICE_ID_PRO: price_test_pro
          STRIPE_PRICE_ID_ENTERPRISE: price_test_enterprise
          UPSTASH_REDIS_REST_URL: http://localhost
          UPSTASH_REDIS_REST_TOKEN: test

  # ---------------------------------------------------------------------------
  # 2. Build validation
  # ---------------------------------------------------------------------------
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: validate-env

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          SUPABASE_SERVICE_ROLE_KEY: test_service_role
          OPENAI_API_KEY: test
          STRIPE_SECRET_KEY: test
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_PRICE_ID_FREE: price_test_free
          STRIPE_PRICE_ID_PRO: price_test_pro
          STRIPE_PRICE_ID_ENTERPRISE: price_test_enterprise
          UPSTASH_REDIS_REST_URL: http://localhost
          UPSTASH_REDIS_REST_TOKEN: test

      - name: Check build output size
        run: |
          echo "=== .next/static sizes ==="
          du -sh .next/static 2>/dev/null || echo "No .next/static directory"
          echo "=== Server bundle sizes ==="
          du -sh .next/server 2>/dev/null || echo "No .next/server directory"

  # ---------------------------------------------------------------------------
  # 3. Unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate-env

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------------------------
  # 4. Health check smoke test (runs after build)
  # ---------------------------------------------------------------------------
  health-check:
    name: Health Endpoint Smoke Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify health route exports a GET handler
        run: |
          node -e "
          const path = require('path');
          const fs   = require('fs');
          const file = path.join(process.cwd(), 'app/api/health/route.ts');
          const src  = fs.readFileSync(file, 'utf8');
          if (!src.includes('export async function GET')) {
            process.exitCode = 1;
            console.error('health route is missing GET export');
          } else {
            console.log('health route GET export found ✓');
          }
          "
