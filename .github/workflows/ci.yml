name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
        if: hashFiles('package.json') != ''

      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test
      - run: npm run build --if-present
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          SUPABASE_SERVICE_ROLE_KEY: test_service_role
          OPENAI_API_KEY: test
          STRIPE_SECRET_KEY: test
          STRIPE_WEBHOOK_SECRET: whsec_test
          STRIPE_PRICE_ID_FREE: price_test_free
          STRIPE_PRICE_ID_PRO: price_test_pro
          STRIPE_PRICE_ID_ENTERPRISE: price_test_enterprise
          UPSTASH_REDIS_REST_URL: http://localhost
          UPSTASH_REDIS_REST_TOKEN: test
